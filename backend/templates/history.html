<!DOCTYPE html>
<html>
<head>
<title>History - BoardEdge AI</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Segoe UI;
    color:white;
    text-align:center;
}

.card{
    width:650px;
    margin:80px auto;
    padding:30px;
    background:rgba(255,255,255,0.15);
    border-radius:20px;
    backdrop-filter:blur(15px);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid white;
}

th{
    background:rgba(0,0,0,0.2);
}

tr:hover{
    background:rgba(255,255,255,0.2);
    transition:0.3s;
}

.low{color:#00ff99;}
.medium{color:#ffcc00;}
.high{color:#ff4d4d;}

a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h2>📚 Your Performance History</h2>

{% if data %}
<table>
<tr>
    <th>Subject</th>
    <th>Marks</th>
    <th>Risk</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td class="{% if row[2]=='Low' %}low{% elif row[2]=='Medium' %}medium{% else %}high{% endif %}">
        {{ row[2] }}
    </td>
</tr>
{% endfor %}
</table>
{% else %}
<p>No history available yet.</p>
{% endif %}

<br><br>

<a href="/">⬅ Back to Dashboard</a>

</div>

</body>
</html>
