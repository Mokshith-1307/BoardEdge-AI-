<!DOCTYPE html>
<html>
<head>
<title>Leaderboard - BoardEdge AI</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Segoe UI;
    color:white;
    text-align:center;
}

.card{
    width:500px;
    margin:80px auto;
    padding:30px;
    background:rgba(255,255,255,0.15);
    border-radius:20px;
    backdrop-filter:blur(15px);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid white;
}

tr:hover{
    background:gold;
    color:black;
    transition:0.3s;
}

a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h2>🏆 Top Performers</h2>

<table>
<tr>
    <th>Subject</th>
    <th>Marks</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
</tr>
{% endfor %}

</table>

<br>
<a href="/">⬅ Back to Dashboard</a>
</div>

</body>
</html>
