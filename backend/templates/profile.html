<!DOCTYPE html>
<html>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#667eea,#764ba2);

    color:white;
    text-align:center;
}

.card{
    width:500px;
    margin:100px auto;
    padding:30px;

    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

</html>
